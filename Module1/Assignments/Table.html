<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
table{
    width: 100%;
    height: 200px;
    padding: 1;  
    
}
td{
    text-align: left;
}
caption{
    text-align: center;
}
th{
    background-color: yellow;
}


    </style>
</head>
<body>

    <table border="">
        <caption ><h3>Basic Course</h3></caption>
        
      
        <tr>
            <th>Sr.No</th>
            <th>Course Name</th>
            <th>Fees</th>
            <th>Duration</th>
            <th>Eligibility</th>
        </tr>
        
        <tr>
           <td>1</td>
            <td>CCC - Course on Computer Concept</td>
            <td>2000</td>
            <td>3 Months</td>
            <td>10<sup>th</sup></td>
        </tr>

        <tr>
            <td>2</td>
            <td>CCA - Course on Computer Application</td>
            <td>15,000</td>
            <td>3 Months</td>
            <td>12<sup>th</sup></td>
        </tr>
        
        <tr>
           <td>3</td>
            <td>Tally</td>
            <td>3000</td>
            <td>3 Months</td>
            <td>12<sup>th</sup></td>
        </tr>
        
        <tr>
            <td>4</td>
            <td>O Level</td>
            <td>15,000</td>
            <td>1 Year</td>
            <td>12<sup>th</sup></td>
        </tr>

    </table>
    
</body>
</html>
