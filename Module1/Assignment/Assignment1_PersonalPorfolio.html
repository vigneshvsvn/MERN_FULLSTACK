<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      color: white;
    }

    /* Background */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Navbar */
    nav {
      position: absolute;
      top: 20px;
      right: 40px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    /* Profile Image */
    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      background: url('https://randomuser.me/api/portraits/men/75.jpg') no-repeat center/cover;
      margin-bottom: 20px;
    }

    /* Text */
    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <a href="#">HOME</a>
    <a href="#">ABOUT</a>
    <a href="#">SERVICES</a>
    <a href="#">WORK</a>
    <a href="#">CONTACT</a>
  </nav>

  <!-- Hero Section -->
  <div class="hero">

    <div class="profile"></div>

    <h1>Hi, I'm Vicky</h1>
    <p>I'M WEB DEVELOPER</p>

  </div>

</body>
</html>
