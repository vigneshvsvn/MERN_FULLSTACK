<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <form action="./Success.html" method="post">
        <h1>Registration Form</h1>
        <label for="FirstName">* Firstname:</label>
        <input type="text" name="name" required placeholder="FirstName">
        <br>
        <br>
        <label for="LastName">* LastName</label>
        <input type="text" name="lastname" placeholder="Lastname" required>
        <br><br>
        <label for="* Address">* Address</label>
        <textarea name="address" id="" required placeholder="Your Address"></textarea>
        <br><br>
        <label for="Gender">*Gender:</label>
        
        <input type="radio" name="Gender" value="Male">Male
        <input type="radio" name="Gender" Value="Female"> Female 
        <br><br>
        <label for="email">* Email: </label>
        <input type="email"  placeholder="valid email id">
        <br>
        <br>
        <label for="DOB">* Date of Birth:</label>
        <input type="date" required>
        <br><br>
        <label for="Language">* Language:</label>
        <input type="checkbox" name="language" id="1" value="Tamil">Tamil
        <input type="checkbox" name="language" id="2" value="English">English
        <input type="checkbox" name="language" id="2" value="Tamil">Others
        <br><br>
        <label for="Qualification">Qualification</label>
        <select required>
        <option>select</option>
        <option>B.sc</option>
        <option>BE</option>
        <option>ME</option>
        <option>B.tech</option>
        <option>M.sc</option>
        <option>Bcom</option>       
        </select>
        <br><br>
        <input type="submit" value="SignUp"/>      


    </form>
    
</body>
</html>
