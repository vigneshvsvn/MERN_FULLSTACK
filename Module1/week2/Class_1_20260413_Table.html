<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        <!-- This is called internal Style sheet -->
table{
    width: 100%;
    height: 200px;
    border-style: 2;
    padding: 1;
}
td{
    text-align: left;
}
caption{
    text-align: center;
}
th{
    background-color: blueviolet;
}


    </style>
</head>
<body>

    <table border="2">
        <caption ><h1><b><u>Student Information</u></b></h1></caption>
        
      
        <tr>
            <th>Id</th>
            <th>Name</th>
            <th>Address</th>
            <th>Course</th>
        </tr>
        
        <tr>
            <td>1</td>
            <td>Vignesh</td>
            <td>Bangalore</td>
            <td>MERN Full Stack</td>
        </tr>

        <tr>
            <td>2</td>
            <td>VK</td>
            <td>Bangalore</td>
            <td>Java Full Stack</td>
        </tr>
        
        <tr>
            <td>3</td>
            <td>GVK</td>
            <td>Bangalore</td>
            <td rowspan="2">Python Full Stack</td>
        </tr>
        
        <tr>
            <td>4</td>
            <td>Vicky</td>
            <td>Bangalore</td>
        </tr>

        <tr>
            <td>5</td>
            <td>Vicky</td>
            <td>Bangalore</td>
            <td>DataScience</td>
        </tr>


    </table>
    
</body>
</html>
